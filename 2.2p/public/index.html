<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
</head>
<body>
    <h1>Calculator</h1>
    <form id="calcForm" action="/calculate" method="GET">
        <input type="text" id="a" name="a" placeholder="Enter first number">
        <input type="text" id="b" name="b" placeholder="Enter second number">

        <select id="operation" name="operation">
            <option value="add">Add</option>
            <option value="subtract">Subtract</option>
            <option value="multiply">Multiply</option>
            <option value="divide">Divide</option>
        </select>

        <button type="submit">Calculate</button>
    </form>

</body>
</html>
